build:
    nodes:
        sim-soft:
            language: python
            python:
                version: "3.10"
            commands:
                - cd sim-soft
                - pip install -r requirements.txt
                - pylint src/ --rcfile=pylint.conf
                - python -m unittest discover tests/

filter:
    excluded_paths:
        - "**/__pycache__/"
        - "sim-soft/venv/"

checks:
    python:
        duplication: true
        code-complexity: true
        coding-style: true

tools:
    pylint:
        config: sim-soft/pylint.conf
